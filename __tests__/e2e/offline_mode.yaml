appId: com.movieexplorer.app
---
- launchApp
- assertVisible:
    id: "movies-list"
    timeout: 5000
- assertVisible:
    id: "offline-banner"
    timeout: 3000
- assertVisible:
    id: "movies-list"
- tapOn:
    id: "movie-card-*"
    index: 0
- assertVisible:
    id: "detail-screen"
    timeout: 3000
- tapOn:
    text: "Watchlist"
- assertVisible:
    id: "watchlist-screen"
